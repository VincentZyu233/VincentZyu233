name: Deploy VitePress Sites

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write # 👈 新增这一行：允许 Cloudflare Action 创建 GitHub Deployment 状态

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Job 1: 部署到 GitHub Pages (带子路径 /VincentZyu233/)
  deploy-gh-pages:
    runs-on: ubuntu-latest
    if: "contains(github.event.head_commit.message, 'build page')"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build for GitHub Pages
        env:
          VITEPRESS_BASE: '/VincentZyu233/'
        run: npm run docs:build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Job 2: 部署到 Cloudflare Pages (根路径 /)
  deploy-cf-pages:
    runs-on: ubuntu-latest
    if: "contains(github.event.head_commit.message, 'build page')"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build for Cloudflare Pages
        env:
          VITEPRESS_BASE: '/'
        run: npm run docs:build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: vincentzyu-vitepress # 需要在 Cloudflare 仪表盘确认项目名称
          directory: docs/.vitepress/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
